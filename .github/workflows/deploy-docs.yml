name: Deploy documentation to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress site
        run: npm run docs:build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/

      - name: Normalize directory index files
        # Some static hosts (or downstream tooling) expect an index.html per
        # directory. VitePress emits README.html for directory pages; copy
        # README.html -> index.html for nested directories so URLs like
        # /guides/ and /sops/ resolve correctly when served from GitHub Pages.
        # Skip the site root so the real homepage (docs/index.md) is not
        # overwritten by docs/README.md.
        run: |
          set -euo pipefail
          find docs/.vitepress/dist -mindepth 2 -type f -name 'README.html' -print0 | while IFS= read -r -d '' f; do
            dir="$(dirname "$f")"
            cp -f "$f" "$dir/index.html"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
